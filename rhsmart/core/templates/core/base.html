<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RH Smart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

.content {
    margin-left: 260px;
    padding: 30px;
    background: #f3f4f6;
    min-height: 100vh;
}
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1f2937;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h4 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .content {
            margin-left: 260px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>💼 RH Smart</h4>

    <a href="/">🏠 Dashboard</a>
    <a href="/funcionarios/">👤 Funcionários</a>
    <a href="/cargos/">📌 Cargos</a>
    <a href="/departamentos/">🏢 Departamentos</a>
    <a href="/folha/">💰 Folha de Pagamento</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
