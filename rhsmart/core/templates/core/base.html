<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RH Smart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: #1e293b;
            color: white;
        }

        .sidebar a {
            color: #cbd5f5;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-dashboard {
            border: none;
            border-radius: 15px;
            color: white;
        }
    </style>
</head>

<body>

<!-- MENU LATERAL -->
<div class="sidebar">
    <h4 class="text-center mt-3">💼 RH Smart</h4>

    <a href="/">🏠 Dashboard</a>
    <a href="/folhas/">📄 Folhas</a>
    <a href="/folha/">➕ Gerar Folha</a>
    <a href="/admin/core/funcionario/">👤 Funcionários</a>
    <a href="/admin/core/cargo/">💼 Cargos</a>
    <a href="/admin/core/departamento/">🏢 Departamentos</a>
</div>

<!-- CONTEÚDO -->
<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
