{% extends 'core/base.html' %}

{% block content %}

<h2 class="mb-4">💼 Cargos</h2>

<a href="/admin/core/cargo/add/" class="btn btn-success mb-3">
    ➕ Novo Cargo
</a>

<table class="table table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Departamento</th>
            <th>Nível</th>
            <th>Carga Horária</th>
        </tr>
    </thead>

    <tbody>
        {% for c in cargos %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.departamento.nome }}</td>
            <td>{{ c.nivel }}</td>
            <td>{{ c.carga_horaria }}h</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
