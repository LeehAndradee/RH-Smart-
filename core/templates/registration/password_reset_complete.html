{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Alterada - RH Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #f8f9fa; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
        }
        .login-container { 
            max-width: 1100px; 
            margin: auto; 
        }
        .brand-section { 
            text-align: center; 
            padding: 20px; 
        }
        .brand-logo { 
            max-width: 350px; 
            margin-bottom: 20px; 
        }
        .brand-title { 
            color: #1a2a4e; 
            font-weight: 800; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }
        .login-card { 
            background: #e9ecef; 
            border-radius: 8px; 
            padding: 40px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .success-icon {
            color: #198754;
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .login-card h2 { 
            color: #1a2a4e; 
            font-weight: 700; 
            margin-bottom: 15px; 
            text-align: center; 
        }
        .btn-entrar { 
            background-color: #1a2a4e; 
            color: white; 
            padding: 12px; 
            font-weight: 700; 
            width: 100%; 
            border-radius: 6px; 
            margin-top: 10px; 
            border: none; 
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-entrar:hover { 
            background-color: #2a3d66; 
            color: white;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="row align-items-center">
        
        <!-- Lado Esquerdo: Logo (Padrão do Sistema) -->
        <div class="col-lg-7 brand-section">
            <img src="{% static 'img/logo.png' %}" alt="Logo RH Smart" class="brand-logo img-fluid">
            <h5 class="brand-title">A Conexão Inteligente entre o RH e Você</h5>
        </div>

        <!-- Lado Direito: Mensagem de Sucesso -->
        <div class="col-lg-5">
            <div class="card login-card text-center">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                
                <h2>Tudo pronto!</h2>
                <p class="text-muted mb-4">
                    Sua senha foi redefinida com sucesso. <br>
                    Agora você já pode acessar sua conta normalmente.
                </p>

                <a href="{% url 'login' %}" class="btn btn-entrar">
                    <i class="fas fa-sign-in-alt me-1"></i> Ir para o Login
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="fixed-bottom bg-dark text-white text-center py-2" style="opacity: 0.8; font-size: 0.8rem;">
    RH SMART - 2026 &copy; Todos os direitos reservados.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
