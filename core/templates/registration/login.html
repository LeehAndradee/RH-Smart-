{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RH Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-container {
            max-width: 1100px;
            margin: auto;
        }
        footer {
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
                /* Lado Esquerdo: Logo */
        .brand-section {
            text-align: center;
            padding: 20px;
        }
        .brand-logo {
            max-width: 450px;
            margin-bottom: 30px;
        }
        .brand-title {
            color: #1a2a4e;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Centro: Card de Login */
        .login-card {
            background: #e9ecef;
            border-radius: 8px;
            padding: 40px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .login-card h2 {
            color: #1a2a4e;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group-text {
            background-color: white;
            border-right: none;
            color: #6c757d;
        }
        .form-control {
            border-left: none;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .btn-entrar {
            background-color: #1a2a4e;
            color: white;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            border-radius: 6px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-entrar:hover {
            background-color: #2a3d66;
            color: white;
        }

        /* Lado Direito: Stats */
        .stats-box {
            border: 2px solid #1a2a4e;
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            margin-top: 50px;
        }
        .stat-item {
            color: #1a2a4e;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .link-footer {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="row align-items-center">
        
        <div class="col-lg-8 brand-section">
           <img src="{% static 'img/logo.png' %}" alt="Logo RH Smart" class="brand-logo  img-fluid">
            <h5 class="brand-title">A Conexão Inteligente entre o RH e Você</h4>
        </div>

        <div class="col-lg-4">
            <div class="card login-card">
                <h2>Entrar</h2>
                <form>
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" placeholder="Usuário" required>
                    </div
                    
                    <div class="input-group mb-1">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" placeholder="Senha" required>
                    </div>

                    <div class="text-end mb-2 mt-2">
                        <a href="#" class="link-footer small">Esqueceu sua senha?</a>
                    </div>

                    <button type="submit" class="btn btn-entrar">Entrar</button>
                    
                    <div class="mt-4 text-center">
                    <p class="mb-1">Não tem uma conta? <a href="#" class="text-primary fw-bold">Cadastre-se aqui</a></p>
                </div>
                </form>
            </div>
        </div>

        
    </div>
</div>

<footer class="fixed-bottom bg-dark text-white text-center py-2" style="opacity: 0.8; font-size: 0.8rem;">
    RH SMART - 2026 &copy; Todos os direitos reservados.
</footer>

</body>
</html>
