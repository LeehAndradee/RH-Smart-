{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Primeiro Acesso - RH Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { max-width: 450px; width: 100%; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1a2a4e; border: none; }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h4 class="fw-bold">Primeiro Acesso</h4>
        <p class="text-muted small">Ative sua conta informando seu CPF</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} small">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">CPF</label>
            <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required value="{{ cpf|default:'' }}">
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Nova Senha</label>
            <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Confirmar Senha</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Repita a senha" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-check-circle me-1"></i> Criar meu acesso
        </button>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none small text-muted">Voltar para o login</a>
        </div>
    </form>
</div>

</body>
</html>
