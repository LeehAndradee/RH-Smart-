{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail Enviado - RH Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-container { max-width: 1100px; margin: auto; }
        .brand-section { text-align: center; padding: 20px; }
        .brand-logo { max-width: 350px; margin-bottom: 20px; }
        .brand-title { color: #1a2a4e; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .login-card { background: #e9ecef; border-radius: 8px; padding: 40px; border: none; text-align: center; }
        .icon-sent { color: #1a2a4e; font-size: 4rem; margin-bottom: 20px; }
        .btn-entrar { background-color: #1a2a4e; color: white; padding: 12px; font-weight: 700; width: 100%; border-radius: 6px; text-decoration: none; display: block; }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="row align-items-center">
        <div class="col-lg-7 brand-section">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="brand-logo img-fluid">
            <h5 class="brand-title">A Conexão Inteligente entre o RH e Você</h5>
        </div>
        <div class="col-lg-5">
            <div class="card login-card shadow-sm">
                <i class="fas fa-paper-plane icon-sent"></i>
                <h2 class="h4">E-mail Enviado!</h2>
                <p class="text-muted small">Enviamos as instruções para o seu e-mail. Se não encontrar, verifique a pasta de Spam.</p>
                <div class="alert alert-info small">
                    <strong>Dica:</strong> Como você está testando, o link apareceu no <b>Terminal do seu VS Code</b>!
                </div>
                <a href="{% url 'login' %}" class="btn btn-entrar">Voltar para o Login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
