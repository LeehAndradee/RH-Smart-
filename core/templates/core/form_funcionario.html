{% extends 'core/base.html' %}

{% block content %}
<h2>Nova Folha de Pagamento</h2>

<form method="post">
    {% csrf_token %}

    <label>Funcionário:</label><br>
    <select name="funcionario" id="funcionario" required>
        <option value="">Selecione</option>
        {% for f in funcionarios %}
            <option value="{{ f.id }}">{{ f.nome }}</option>
        {% endfor %}
    </select>
    <br><br>

    <label>Tipo de Folha:</label><br>
    <select name="tipo" id="tipo" required>
        <option value="normal">Normal</option>
        <option value="ferias">Férias</option>
        <option value="decimo">13º Salário</option>
        <option value="rescisao">Rescisão</option>
    </select>
    <br><br>

    <label>Mês:</label>
    <input type="number" name="mes" required>

    <label>Ano:</label>
    <input type="number" name="ano" required>
    <br><br>

    <!-- CAMPOS DINÂMICOS -->
    <div id="extras"></div>

    <hr>

    <h4>💰 Cálculos</h4>

    <label>Salário Base:</label>
    <input type="text" id="salario" readonly><br>

    <label>INSS:</label>
    <input type="text" id="inss" readonly><br>

    <label>IRRF:</label>
    <input type="text" id="irrf" readonly><br>

    <label>FGTS:</label>
    <input type="text" id="fgts" readonly><br>

    <label>Salário Líquido:</label>
    <input type="text" id="liquido" readonly><br><br>

    <button type="submit">Salvar</button>
</form>

<a href="/folha/">Voltar</a>

<script>
let salarioBase = 0;

document.getElementById('funcionario').addEventListener('change', function() {
    let id = this.value;

    fetch(`/api/funcionario/${id}/`)
    .then(r => r.json())
    .then(data => {
        salarioBase = parseFloat(data.salario);
        calcular();
    });
});

document.getElementById('tipo').addEventListener('change', function() {
    montarCampos();
    calcular();
});

function montarCampos() {
    let tipo = document.getElementById('tipo').value;
    let extras = document.getElementById('extras');

    extras.innerHTML = '';

    if (tipo === 'ferias') {
        extras.innerHTML += `
            Dias de férias:
            <input type="number" id="dias_ferias" value="30"><br>
        `;
    }

    if (tipo === 'decimo') {
        extras.innerHTML += `
            Meses trabalhados:
            <input type="number" id="meses" value="12"><br>
        `;
    }

    if (tipo === 'rescisao') {
        extras.innerHTML += `
            Meses trabalhados no ano:
            <input type="number" id="meses_resc" value="6"><br>

            Férias vencidas:
            <input type="number" id="ferias_vencidas" value="1"><br>
        `;
    }
}

function calcular() {
    let tipo = document.getElementById('tipo').value;

    let salario = salarioBase;
    let inss = 0;
    let irrf = 0;
    let fgts = 0;
    let liquido = 0;

    if (tipo === 'normal') {
        inss = salario * 0.11;
        irrf = salario * 0.08;
        fgts = salario * 0.08;
        liquido = salario - inss - irrf;
    }

    if (tipo === 'ferias') {
        let bonus = salario / 3;
        salario = salario + bonus;

        inss = salario * 0.11;
        fgts = salario * 0.08;

        liquido = salario - inss;
    }

    if (tipo === 'decimo') {
        let meses = document.getElementById('meses')?.value || 12;
        salario = (salario / 12) * meses;

        inss = salario * 0.11;
        irrf = salario * 0.08;

        liquido = salario - inss - irrf;
    }

    if (tipo === 'rescisao') {
        let meses = document.getElementById('meses_resc')?.value || 6;
        let ferias = document.getElementById('ferias_vencidas')?.value || 0;

        let decimo = (salario / 12) * meses;
        let feriasValor = salario * ferias;
        let terco = feriasValor / 3;

        salario = salario + decimo + feriasValor + terco;

        inss = salario * 0.11;
        fgts = salario * 0.08;

        liquido = salario - inss;
    }

    document.getElementById('salario').value = salario.toFixed(2);
    document.getElementById('inss').value = inss.toFixed(2);
    document.getElementById('irrf').value = irrf.toFixed(2);
    document.getElementById('fgts').value = fgts.toFixed(2);
    document.getElementById('liquido').value = liquido.toFixed(2);
}

montarCampos();
</script>

{% endblock %}
