{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">
                {% if departamento.id %}
                    <i class="fas fa-edit me-2"></i>Editar Departamento: {{ departamento.nome }}
                {% else %}
                    <i class="fas fa-plus me-2"></i>Novo Departamento
                {% endif %}
            </h4>
        </div>
        
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Nome do Departamento:</label>
                    <input type="text" name="nome" class="form-control shadow-sm"
                           placeholder="Ex: Recursos Humanos"
                           value="{{ departamento.nome|default:'' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Descrição:</label>
                    <textarea name="descricao" class="form-control shadow-sm" rows="3" 
                              placeholder="Descreva as responsabilidades...">{{ departamento.descricao|default:'' }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Departamento Superior (Opcional):</label>
                    <select name="parent_id" class="form-select shadow-sm">
                        <option value="">Nenhum (Departamento Principal)</option>
                        {% for d in departamentos %}
                            <option value="{{ d.id }}" {% if departamento.parent_id == d.id %}selected{% endif %}>
                                {{ d.nome }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <hr>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-5 fw-bold shadow">
                        <i class="fas fa-save me-2"></i>Salvar Alterações
                    </button>
                    <a href="{% url 'departamento_view' %}" class="btn btn-outline-secondary px-5 fw-bold">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
