{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Departamentos</h2>
    <a href="{% url 'departamento_create' %}" class="btn btn-primary">Novo Departamento</a>
</div>

<table class="table table-hover bg-white border">
    <thead class="table-dark">
        <tr>
            <th>Nome do Departamento</th>
            <th>Sigla</th>
            <th class="text-center">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for d in departamentos %}
        <tr>
            <td>{{ d.nome }}</td>
            <td>{{ d.sigla|default:"-" }}</td>
            <td class="text-center">
                <a href="{% url 'departamento_update' d.id %}" class="btn btn-sm btn-warning">Editar</a>
                
                <a href="{% url 'departamento_delete' d.id %}" 
                   class="btn btn-sm btn-danger" 
                   onclick="return confirm('Tem certeza que deseja excluir este departamento?')">
                   Excluir
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">Nenhum departamento encontrado.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
