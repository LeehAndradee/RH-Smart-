{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Departamentos</h2>
    <a href="/departamentos/novo/" class="btn btn-primary">Novo Departamento</a>
</div>

<table class="table table-hover bg-white border">
    <thead class="table-dark">
        <tr>
            <th>Nome do Departamento</th>
            <th>Sigla</th>
            <th class="text-center">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for d in departamentos %}
        <tr>
            <td>{{ d.nome }}</td>
            <td>{{ d.sigla|default:"-" }}</td>
            <td class="text-center">
                <a href="/departamentos/editar/{{ d.id }}/" class="btn btn-sm btn-warning">Editar</a>
                <a href="/departamentos/excluir/{{ d.id }}/" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">Nenhum departamento encontrado.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
