{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cadastrar Novo Evento</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Nome do Evento</label>
                            <input type="text" name="nome" class="form-control" placeholder="Ex: Horas Extras, INSS, Vale Refeição" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select name="tipo" class="form-select" required>
                                <option value="P">Provento (Soma)</option>
                                <option value="D">Desconto (Subtrai)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Valor ou Porcentagem</label>
                            <input type="number" step="0.01" name="valor" class="form-control" placeholder="0.00" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'eventos_list' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Salvar Evento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
