{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4">
        {% if folha %}Editar{% else %}Nova{% endif %} Folha de Pagamento
    </h2>

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}

        <!-- FUNCIONÁRIO -->
        <div class="mb-3">
            <label class="form-label">Funcionário</label>
            <select name="funcionario" id="funcionario" class="form-control" required>
                <option value="">Selecione</option>
                {% for f in funcionarios %}
                    <option value="{{ f.id }}"
                        {% if folha.funcionario.id == f.id %}selected{% endif %}>
                        {{ f.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- TIPO -->
        <div class="mb-3">
            <label class="form-label">Tipo de Folha</label>
            <select name="tipo" id="tipo" class="form-control" required>
                <option value="normal">Normal</option>
                <option value="ferias">Férias</option>
                <option value="decimo">13º</option>
                <option value="rescisao">Rescisão</option>
            </select>
        </div>

        <!-- PERÍODO -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Mês</label>
                <input type="number" name="mes" class="form-control"
                       value="{{ folha.mes|default:'' }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Ano</label>
                <input type="number" name="ano" class="form-control"
                       value="{{ folha.ano|default:'' }}" required>
            </div>
        </div>

        <!-- CAMPOS DINÂMICOS -->
        <div id="extras" class="mb-3"></div>

        <hr>

        <!-- CÁLCULOS -->
        <h5 class="mb-3">💰 Cálculos Automáticos</h5>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Salário Base</label>
                <input type="text" id="salario" class="form-control" readonly>
            </div>

            <div class="col-md-4 mb-3">
                <label>INSS</label>
                <input type="text" id="inss" class="form-control" readonly>
            </div>

            <div class="col-md-4 mb-3">
                <label>IRRF</label>
                <input type="text" id="irrf" class="form-control" readonly>
            </div>

            <div class="col-md-4 mb-3">
                <label>FGTS</label>
                <input type="text" id="fgts" class="form-control" readonly>
            </div>

            <div class="col-md-4 mb-3">
                <label>Salário Líquido</label>
                <input type="text" id="liquido" class="form-control" readonly>
            </div>
        </div>

        <!-- BOTÕES -->
        <div class="mt-3">
            <button type="submit" class="btn btn-success">
                💾 Salvar
            </button>

            <a href="/folha/" class="btn btn-secondary">
                Voltar
            </a>
        </div>
    </form>
</div>

<!-- SCRIPT -->
<script>
let salarioBase = 0;

document.getElementById('funcionario').addEventListener('change', function() {
    let id = this.value;

    if (!id) return;

    fetch(`/api/funcionario/${id}/`)
    .then(response => response.json())
    .then(data => {
        salarioBase = parseFloat(data.salario);
        calcular();
    });
});

document.getElementById('tipo').addEventListener('change', function() {
    montarCampos();
    calcular();
});

function montarCampos() {
    let tipo = document.getElementById('tipo').value;
    let extras = document.getElementById('extras');

    extras.innerHTML = '';

    if (tipo === 'ferias') {
        extras.innerHTML += `
            <label>Dias de férias</label>
            <input type="number" id="dias_ferias" class="form-control mb-2" value="30">
        `;
    }

    if (tipo === 'decimo') {
        extras.innerHTML += `
            <label>Meses trabalhados</label>
            <input type="number" id="meses" class="form-control mb-2" value="12">
        `;
    }

    if (tipo === 'rescisao') {
        extras.innerHTML += `
            <label>Meses trabalhados no ano</label>
            <input type="number" id="meses_resc" class="form-control mb-2" value="6">

            <label>Férias vencidas</label>
            <input type="number" id="ferias_vencidas" class="form-control mb-2" value="1">
        `;
    }
}

function calcular() {
    let tipo = document.getElementById('tipo').value;

    let salario = salarioBase;
    let inss = 0;
    let irrf = 0;
    let fgts = 0;
    let liquido = 0;

    if (tipo === 'normal') {
        inss = salario * 0.11;
        irrf = salario * 0.08;
        fgts = salario * 0.08;
        liquido = salario - inss - irrf;
    }

    if (tipo === 'ferias') {
        let bonus = salario / 3;
        salario += bonus;

        inss = salario * 0.11;
        fgts = salario * 0.08;

        liquido = salario - inss;
    }

    if (tipo === 'decimo') {
        let meses = document.getElementById('meses')?.value || 12;
        salario = (salario / 12) * meses;

        inss = salario * 0.11;
        irrf = salario * 0.08;

        liquido = salario - inss - irrf;
    }

    if (tipo === 'rescisao') {
        let meses = document.getElementById('meses_resc')?.value || 6;
        let ferias = document.getElementById('ferias_vencidas')?.value || 0;

        let decimo = (salario / 12) * meses;
        let feriasValor = salario * ferias;
        let terco = feriasValor / 3;

        salario = salario + decimo + feriasValor + terco;

        inss = salario * 0.11;
        fgts = salario * 0.08;

        liquido = salario - inss;
    }

    document.getElementById('salario').value = salario.toFixed(2);
    document.getElementById('inss').value = inss.toFixed(2);
    document.getElementById('irrf').value = irrf.toFixed(2);
    document.getElementById('fgts').value = fgts.toFixed(2);
    document.getElementById('liquido').value = liquido.toFixed(2);
}

// inicia
montarCampos();
</script>

{% endblock %}
