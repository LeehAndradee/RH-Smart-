{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0" style="border-radius: 1rem;">
                <div class="card-header bg-dark text-white p-4" style="border-radius: 1rem 1rem 0 0;">
                    <h4 class="mb-0">
                        <i class="fas fa-calculator me-2 text-success"></i>
                        {% if folha %}Editar{% else %}Gerar{% endif %} Folha de Pagamento
                    </h4>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small">COLABORADOR</label>
                            <select name="funcionario" class="form-select form-select-lg border-2 shadow-sm" required>
                                <option value="" disabled {% if not folha %}selected{% endif %}>Selecione o funcionário...</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.id }}" {% if folha.funcionario.id == f.id %}selected{% endif %}>
                                        {{ f.nome }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">MÊS</label>
                                <input type="number" name="mes" class="form-control" value="{{ folha.mes|default:4 }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">ANO</label>
                                <input type="number" name="ano" class="form-control" value="{{ folha.ano|default:2026 }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-primary">TIPO DE FOLHA</label>
                                <select name="tipo" id="id_tipo" class="form-select border-primary fw-bold" required>
                                    <option value="MENSAL" {% if folha.tipo == 'MENSAL' %}selected{% endif %}>Mensal</option>
                                    <option value="FERIAS" {% if folha.tipo == 'FERIAS' %}selected{% endif %}>Férias</option>
                                    <option value="DECIMO" {% if folha.tipo == 'DECIMO' or folha.tipo == '13_SALARIO' %}selected{% endif %}>13º Salário</option>
                                    <option value="RESCISAO" {% if folha.tipo == 'RESCISAO' %}selected{% endif %}>Rescisão</option>
                                </select>
                            </div>
                        </div>

                        <div id="secao-dinamica" class="p-4 rounded bg-light border border-dashed mb-4" style="display: none;">
                            <h6 class="fw-bold mb-3" id="titulo-dinamico">Configurações Adicionais</h6>
                            
                            <div id="campo-ferias" style="display: none;">
                                <label class="form-label small">Dias de Férias:</label>
                                <input type="number" name="dias_gozo_ferias" class="form-control w-50" value="{{ folha.dias_gozo_ferias|default:30 }}">
                            </div>

                            <div id="campo-rescisao" style="display: none;">
                                <label class="form-label small">Data de Desligamento:</label>
                                <input type="date" name="data_rescisao" class="form-control w-50" value="{{ folha.data_rescisao|date:'Y-m-d' }}">
                            </div>

                            <div id="campo-decimo" style="display: none;">
                                <label class="form-label small">Parcela do 13º:</label>
                                <select name="parcela_13o" class="form-select w-50 border-info">
                                    <option value="1" {% if folha.parcela_13o == 1 %}selected{% endif %}>1ª Parcela (50% sem descontos)</option>
                                    <option value="2" {% if folha.parcela_13o == 2 %}selected{% endif %}>2ª Parcela (Com descontos totais)</option>
                                    <option value="0" {% if folha.parcela_13o == 0 %}selected{% endif %}>Parcela Única (Integral)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold text-muted small">EVENTOS EXTRAS (PROVENTOS/DESCONTOS)</label>
                                <button type="button" class="btn btn-sm btn-outline-primary" id="btn-add-evento">
                                    <i class="fas fa-plus"></i> Adicionar Evento
                                </button>
                            </div>
                            <div class="table-responsive rounded border shadow-sm">
                                <table class="table table-hover mb-0" id="tabela-eventos">
                                    <thead class="table-light text-muted small">
                                        <tr>
                                            <th>Evento</th>
                                            <th style="width: 200px;">Valor (R$)</th>
                                            <th style="width: 50px;"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {% if folha %}
                                            {% for item in folha.itens.all %}
                                            <tr>
                                                <td>
                                                    <select name="evento_id[]" class="form-select border-0 select-evento" required>
                                                        {% for e in eventos %}
                                                            <option value="{{ e.id }}" {% if item.evento.id == e.id %}selected{% endif %} data-valor="{{ e.valor_fixo|stringformat:'.2f' }}">
                                                                {{ e.nome }} ({% if e.tipo == 'P' %}P{% else %}D{% endif %})
                                                            </option>
                                                        {% endfor %}
                                                    </select>
                                                </td>
                                                <td>
                                                    <input type="number" step="0.01" name="evento_valor[]" class="form-control border-0 bg-light input-valor" value="{{ item.valor|stringformat:'.2f'|safe }}" required>
                                                </td>
                                                <td class="text-center">
                                                    <button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()">
                                                        <i class="fas fa-times-circle"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                            {% endfor %}
                                        {% endif %}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-between">
                            <a href="{% url 'folha_view' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow">
                                {% if folha %}Salvar Alterações{% else %}Gerar Folha{% endif %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const tipoSelect = document.getElementById('id_tipo');
    const secao = document.getElementById('secao-dinamica');
    const fers = document.getElementById('campo-ferias');
    const resc = document.getElementById('campo-rescisao');
    const deci = document.getElementById('campo-decimo');
    const titu = document.getElementById('titulo-dinamico');

    function gerenciarCamposDinamicos() {
        secao.style.display = 'none'; fers.style.display = 'none'; resc.style.display = 'none'; deci.style.display = 'none';
        if (tipoSelect.value !== 'MENSAL') {
            secao.style.display = 'block';
            if (tipoSelect.value === 'FERIAS') { fers.style.display = 'block'; titu.innerText = 'Detalhes de Férias'; }
            else if (tipoSelect.value === 'RESCISAO') { resc.style.display = 'block'; titu.innerText = 'Detalhes de Rescisão'; }
            else if (tipoSelect.value === 'DECIMO') { deci.style.display = 'block'; titu.innerText = 'Configuração do 13º Salário'; }
        }
    }

    tipoSelect.addEventListener('change', gerenciarCamposDinamicos);
    
    // Dispara ao carregar para caso de edição
    window.onload = gerenciarCamposDinamicos;

    document.getElementById('btn-add-evento').addEventListener('click', function() {
        const tbody = document.querySelector('#tabela-eventos tbody');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td>
                <select name="evento_id[]" class="form-select border-0 select-evento" required>
                    <option value="">Selecione um evento...</option>
                    {% for e in eventos %}
                        <option value="{{ e.id }}" data-valor="{{ e.valor_fixo|stringformat:'.2f' }}">
                            {{ e.nome }} ({% if e.tipo == 'P' %}P{% else %}D{% endif %})
                        </option>
                    {% endfor %}
                </select>
            </td>
            <td>
                <input type="number" step="0.01" name="evento_valor[]" class="form-control border-0 bg-light input-valor" placeholder="0,00" required>
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()">
                    <i class="fas fa-times-circle"></i>
                </button>
            </td>
        `;
        tbody.appendChild(tr);

        const select = tr.querySelector('.select-evento');
        select.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const valorFixo = selectedOption.getAttribute('data-valor');
            const inputValor = tr.querySelector('.input-valor');
            if (valorFixo && valorFixo !== "None") {
                inputValor.value = valorFixo.replace(',', '.');
            }
        });
    });
</script>
{% endblock %}
