{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0" style="border-radius: 1rem;">
                <div class="card-header bg-dark text-white p-4" style="border-radius: 1rem 1rem 0 0;">
                    <h4 class="mb-0"><i class="fas fa-calculator me-2 text-success"></i>Gerar Folha de Pagamento</h4>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small">COLABORADOR</label>
                            <select name="funcionario" class="form-select form-select-lg border-2 shadow-sm" required>
                                <option value="" selected disabled>Selecione o funcionário...</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.id }}">{{ f.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">MÊS</label>
                                <input type="number" name="mes" class="form-control" value="4" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">ANO</label>
                                <input type="number" name="ano" class="form-control" value="2026" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-primary">TIPO DE FOLHA</label>
                                <select name="tipo" id="id_tipo" class="form-select border-primary fw-bold" required>
                                    <option value="MENSAL">Mensal</option>
                                    <option value="FERIAS">Férias</option>
                                    <option value="DECIMO">13º Salário</option>
                                    <option value="RESCISAO">Rescisão</option>
                                </select>
                            </div>
                        </div>

                        <div id="secao-dinamica" class="p-4 rounded bg-light border border-dashed mb-4" style="display: none;">
                            <h6 class="fw-bold mb-3" id="titulo-dinamico">Configurações Adicionais</h6>
                            
                            <div id="campo-ferias" style="display: none;">
                                <label class="form-label small">Dias de Férias:</label>
                                <input type="number" name="dias_gozo_ferias" class="form-control w-50" value="30">
                            </div>

                            <div id="campo-rescisao" style="display: none;">
                                <label class="form-label small">Data de Desligamento:</label>
                                <input type="date" name="data_rescisao" class="form-control w-50">
                            </div>

                            <div id="campo-decimo" style="display: none;">
                                <label class="form-label small">Parcela do 13º:</label>
                                <select name="parcela_13o" class="form-select w-50 border-info">
                                    <option value="1">1ª Parcela (50% sem descontos)</option>
                                    <option value="2">2ª Parcela (Com descontos totais)</option>
                                    <option value="0">Parcela Única (Integral)</option>
                                </select>
                                <div class="form-text text-info">A 1ª parcela não possui descontos de INSS/IRRF por lei.</div>
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-between">
                            <a href="{% url 'folha_view' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow">Gerar Folha</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const tipoSelect = document.getElementById('id_tipo');
    const secao = document.getElementById('secao-dinamica');
    const fers = document.getElementById('campo-ferias');
    const resc = document.getElementById('campo-rescisao');
    const deci = document.getElementById('campo-decimo');
    const titu = document.getElementById('titulo-dinamico');

    tipoSelect.addEventListener('change', function() {
        // Reset
        secao.style.display = 'none';
        fers.style.display = 'none';
        resc.style.display = 'none';
        deci.style.display = 'none';

        if (this.value !== 'MENSAL') {
            secao.style.display = 'block';
            if (this.value === 'FERIAS') {
                fers.style.display = 'block';
                titu.innerText = 'Detalhes de Férias';
            } else if (this.value === 'RESCISAO') {
                resc.style.display = 'block';
                titu.innerText = 'Detalhes de Rescisão';
            } else if (this.value === 'DECIMO') {
                deci.style.display = 'block';
                titu.innerText = 'Configuração do 13º Salário';
            }
        }
    });
</script>
{% endblock %}
