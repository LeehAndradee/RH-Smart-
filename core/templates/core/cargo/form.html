{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h2>
        {% if cargo %}
            Editar Cargo
        {% else %}
            Novo Cargo
        {% endif %}
    </h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nome do Cargo:</label>
            <input type="text" name="nome" class="form-control"
                   value="{{ cargo.nome|default:'' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nível:</label>
            <input type="text" name="nivel" class="form-control"
                   value="{{ cargo.nivel|default:'' }}" required 
                   placeholder="Ex: Júnior, Pleno, Sênior">
        </div>

        <div class="mb-3">
            <label class="form-label">Carga Horária (horas):</label>
            <input type="number" name="carga_horaria" class="form-control"
                   value="{{ cargo.carga_horaria|default:40 }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Departamento:</label>
            <select name="departamento" class="form-select" required>
                <option value="" disabled {% if not cargo %}selected{% endif %}>Selecione</option>
                {% for d in departamentos %}
                    <option value="{{ d.id }}"
                        {% if cargo.departamento.id == d.id %}selected{% endif %}>
                        {{ d.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Salvar Cargo</button>
            <a href="{% url 'cargos_view' %}" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>

</div>
{% endblock %}
