{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Equipe de Funcionários</h2>
    <a href="/funcionarios/novo/" class="btn btn-primary">+ Novo Funcionário</a>
</div>

<table class="table table-hover bg-white border">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Cargo</th>
            <th>Departamento</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for f in funcionarios %}
        <tr>
            <td>{{ f.nome }}</td>
            <td>{{ f.cpf }}</td>
            <td>{{ f.cargo }}</td>
            <td>{{ f.departamento }}</td>
            <td>
                <a href="/funcionarios/editar/{{ f.id }}/" class="btn btn-sm btn-warning">Editar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center">Nenhum funcionário cadastrado ainda.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
