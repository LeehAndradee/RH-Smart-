{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-3">
                    <h4 class="mb-0"><i class="fas fa-calendar-times me-2"></i>Registrar Falta / Ausência</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <!-- Seleção de Funcionário -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Funcionário</label>
                            <select name="funcionario" class="form-select" required>
                                <option value="" selected disabled>Selecione quem faltou...</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.id }}">{{ f.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <!-- Data exata do ocorrido -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Data da Falta</label>
                                <input type="date" name="data" class="form-control" required>
                            </div>
                            
                            <!-- Valor do Desconto Manual -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-danger">Valor do Desconto (R$)</label>
                                <input type="number" step="0.01" name="valor_desconto" class="form-control" placeholder="0,00" required>
                                <small class="text-muted">Valor a ser abatido no holerite.</small>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Mês de Referência para a Folha -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Mês da Folha</label>
                                <select name="mes_referencia" class="form-select" required>
                                    <option value="1">Janeiro</option>
                                    <option value="2">Fevereiro</option>
                                    <option value="3">Março</option>
                                    <option value="4" selected>Abril</option>
                                    <option value="5">Maio</option>
                                    <option value="6">Junho</option>
                                    <option value="7">Julho</option>
                                    <option value="8">Agosto</option>
                                    <option value="9">Setembro</option>
                                    <option value="10">Outubro</option>
                                    <option value="11">Novembro</option>
                                    <option value="12">Dezembro</option>
                                </select>
                            </div>
                            <!-- Ano de Referência -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Ano da Folha</label>
                                <input type="number" name="ano_referencia" class="form-control" value="2026" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo/Descrição</label>
                            <textarea name="motivo" class="form-control" rows="2" placeholder="Ex: Consulta médica, problemas técnicos..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Anexar Atestado (PDF ou Imagem)</label>
                            <input type="file" name="atestado" class="form-control">
                        </div>
                        
                        <!-- Checkbox de Abono (Switch Estilizado) -->
                        <div class="form-check form-switch mb-4">
                            <input type="checkbox" class="form-check-input" id="justificada" name="justificada">
                            <label class="form-check-label fw-bold text-success" for="justificada">
                                Abonar falta? (Se marcado, o desconto será ignorado na folha)
                            </label>
                        </div>
                        
                        <hr>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'faltas_list' %}" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5">Salvar Registro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
