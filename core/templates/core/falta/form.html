{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-3">
                    <h4 class="mb-0">
                        <i class="fas fa-calendar-times me-2"></i>
                        {% if falta.id %}Editar Falta{% else %}Registrar Falta / Ausência{% endif %}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <!-- Seleção de Funcionário -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Funcionário</label>
                            <select name="funcionario" class="form-select" required>
                                <option value="" disabled {% if not falta %}selected{% endif %}>Selecione quem faltou...</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.id }}" {% if falta.funcionario.id == f.id %}selected{% endif %}>
                                        {{ f.nome }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <!-- Data exata do ocorrido -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Data da Falta</label>
                                <!-- O filtro |date:"Y-m-d" é obrigatório para o input type="date" reconhecer o valor -->
                                <input type="date" name="data" class="form-control" value="{{ falta.data|date:'Y-m-d' }}" required>
                            </div>
                            
                            <!-- Valor do Desconto Manual -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-danger">Valor do Desconto (R$)</label>
                                <input type="number" step="0.01" name="valor_desconto" class="form-control" value="{{ falta.valor_desconto|stringformat:'.2f'|default:'0.00' }}" required>
                                <small class="text-muted">Valor a ser abatido no holerite.</small>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Mês de Referência -->
                           <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Mês da Folha</label>
                                <select name="mes_referencia" class="form-select" required>
                                    <option value="1" {% if falta.mes_referencia == 1 %}selected{% endif %}>Janeiro</option>
                                    <option value="2" {% if falta.mes_referencia == 2 %}selected{% endif %}>Fevereiro</option>
                                    <option value="3" {% if falta.mes_referencia == 3 %}selected{% endif %}>Março</option>
                                    <!-- Abrindo a folha de Abril (valor 4) como padrão se for novo registro -->
                                    <option value="4" {% if falta.mes_referencia == 4 or not falta %}selected{% endif %}>Abril</option>
                                    <option value="5" {% if falta.mes_referencia == 5 %}selected{% endif %}>Maio</option>
                                    <option value="6" {% if falta.mes_referencia == 6 %}selected{% endif %}>Junho</option>
                                    <option value="7" {% if falta.mes_referencia == 7 %}selected{% endif %}>Julho</option>
                                    <option value="8" {% if falta.mes_referencia == 8 %}selected{% endif %}>Agosto</option>
                                    <option value="9" {% if falta.mes_referencia == 9 %}selected{% endif %}>Setembro</option>
                                    <option value="10" {% if falta.mes_referencia == 10 %}selected{% endif %}>Outubro</option>
                                    <option value="11" {% if falta.mes_referencia == 11 %}selected{% endif %}>Novembro</option>
                                    <option value="12" {% if falta.mes_referencia == 12 %}selected{% endif %}>Dezembro</option>
                                </select>
                            </div>
                                                        <!-- Ano de Referência -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Ano da Folha</label>
                                <input type="number" name="ano_referencia" class="form-control" value="{{ falta.ano_referencia|default:'2026' }}" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo/Descrição</label>
                            <textarea name="motivo" class="form-control" rows="2" placeholder="Ex: Consulta médica...">{{ falta.motivo|default:'' }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Anexar Atestado (PDF ou Imagem)</label>
                            {% if falta.atestado %}
                                <div class="mb-2 small text-muted">
                                    Arquivo atual: <a href="{{ falta.atestado.url }}" target="_blank">Visualizar Documento</a>
                                </div>
                            {% endif %}
                            <input type="file" name="atestado" class="form-control">
                        </div>
                        
                        <!-- Checkbox de Abono -->
                        <div class="form-check form-switch mb-4">
                            <input type="checkbox" class="form-check-input" id="justificada" name="justificada" {% if falta.justificada %}checked{% endif %}>
                            <label class="form-check-label fw-bold text-success" for="justificada">
                                Abonar falta? (Se marcado, o desconto será ignorado na folha)
                            </label>
                        </div>
                        
                        <hr>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'faltas_list' %}" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5">
                                {% if falta.id %}Atualizar Registro{% else %}Salvar Registro{% endif %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
