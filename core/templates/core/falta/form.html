{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Justificar Ausência / Falta</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Funcionário</label>
                            <select name="funcionario" class="form-select" required>
                                <option value="" selected disabled>Selecione quem faltou...</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.id }}">{{ f.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data da Falta</label>
                            <input type="date" name="data" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Motivo/Descrição</label>
                            <textarea name="motivo" class="form-control" rows="3" placeholder="Ex: Consulta médica, problemas técnicos..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Anexar Atestado (PDF ou Imagem)</label>
                            <input type="file" name="atestado" class="form-control">
                        </div>
                        
                        <div class="form-check mb-4">
                            <input type="checkbox" class="form-check-input" id="justificada" name="justificada">
                            <label class="form-check-label" for="justificada">Abonar falta (Uso exclusivo do RH)</label>
                        </div>
                        
                        <hr>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success px-4">Salvar Registro</button>
                            <a href="{% url 'faltas_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
