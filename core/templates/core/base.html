<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { 
            min-height: 100vh; 
            background: #2c3e50; 
            color: white; 
            padding-top: 20px; 
            position: sticky;
            top: 0;
        }
        .nav-link { 
            color: #bdc3c7; 
            padding: 12px 20px;
            transition: all 0.3s;
        }
        .nav-link:hover { 
            color: white; 
            background: #34495e; 
            border-radius: 5px;
        }
        .nav-link.active {
            color: #fff;
            background: #1abc9c;
        }
        .main-content { 
            padding: 30px; 
            background: #f8f9fa; 
            min-height: 100vh; 
        }
        hr { border-color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 sidebar d-none d-md-block shadow">
                <h4 class="text-center py-2">🚀 RH Smart</h4>
                <hr>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departamentos/">🏢 Departamentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cargos/">💼 Cargos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/funcionarios/">👥 Funcionários</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/eventos/">⚡ Eventos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/faltas/">⚠️ Faltas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/folha/">📄 Folha de Pagamento</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-9 col-lg-10 main-content">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
